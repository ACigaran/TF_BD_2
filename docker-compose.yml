services:
  mysql:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tf_bd_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: tf_bd
    ports:
      - "3307:3306"
    volumes:
      - tf_bd_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./App
      dockerfile: Dockerfile
    container_name: tf_bd_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root1234
      DB_NAME: tf_bd
    depends_on:
      mysql:
        condition: service_healthy

  adminer:
    image: adminer:latest
    container_name: tf_bd_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  tf_bd_data: