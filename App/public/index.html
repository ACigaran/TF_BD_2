<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Voto Electrónico</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #21262d;
      --accent: #2ea84f;
      --accent-dim: #1a3a26;
      --text: #e6edf3;
      --muted: #7d8590;
      --danger: #f85149;
      --warn: #d29922;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 8px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    #db-status {
      color: var(--muted);
      font-size: 13px;
      margin-left: auto;
    }

    .layout {
      display: flex;
      min-height: calc(100vh - 73px);
    }

    nav {
      width: 220px;
      border-right: 1px solid var(--border);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    nav button {
      width: 100%;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      text-align: left;
      padding: 9px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s, color 0.15s;
    }

    nav button:hover { background: var(--border); color: var(--text); }
    nav button.active { background: var(--accent-dim); color: var(--accent); }
    nav .icon { font-size: 15px; width: 18px; text-align: center; }

    .content {
      flex: 1;
      padding: 28px 32px;
      overflow: auto;
    }


    .content-header {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .content-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      flex: 1;
    }

    .badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
    }


    .btn-query {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 9px 18px;
      border-radius: 7px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-query:hover { opacity: 0.88; }
    .btn-query:active { transform: scale(0.97); }

    .btn-query:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-query .btn-icon { font-size: 15px; }


    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
      border: 1px dashed var(--border);
      border-radius: 10px;
    }

    .placeholder .ph-icon { font-size: 40px; }
    .placeholder p { font-size: 14px; line-height: 1.6; }
    .placeholder span { font-size: 12px; color: #484f58; }


    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px;
      color: var(--muted);
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }


    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: auto;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface); }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .pill-green { background: #1a3a26; color: #2ea84f; }
    .pill-red   { background: #3a1a1a; color: #f85149; }
    .pill-gray  { background: #21262d; color: #7d8590; }
    .pill-warn  { background: #3a2e1a; color: #d29922; }

    .empty {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    .num { font-variant-numeric: tabular-nums; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <div class="logo">🗳️</div>
  <h1>Voto Electrónico — tf_bd</h1>
  <span id="db-status">● Listo</span>
</header>

<div class="layout">
  <nav>
    <button class="active" onclick="selectSection('ciudadanos', this)">
      <span class="icon">👤</span> Ciudadanos
    </button>
    <button onclick="selectSection('elecciones', this)">
      <span class="icon">📋</span> Elecciones
    </button>
    <button onclick="selectSection('votos-partido', this)">
      <span class="icon">📊</span> Votos por partido
    </button>
    <button onclick="selectSection('mesas', this)">
      <span class="icon">🏫</span> Mesas y circuitos
    </button>
    <button onclick="selectSection('candidatos', this)">
      <span class="icon">🏅</span> Candidatos y listas
    </button>
  </nav>

  <main class="content">
    <div class="content-header">
      <h2 id="section-title">Ciudadanos</h2>
      <span class="badge" id="row-count" style="display:none"></span>
      <button class="btn-query" id="btn-query" onclick="executeQuery()">
        <span class="btn-icon">🔍</span>
        <span id="btn-label">Consultar ciudadanos en la DB</span>
      </button>
    </div>
    <div id="output">
      <div class="placeholder">
        <div class="ph-icon">🗃️</div>
        <p>Presioná el botón para ejecutar la consulta<br>y ver los datos de <strong>Ciudadanos</strong>.</p>
        <span>Los datos se cargan desde MySQL en el contenedor Docker.</span>
      </div>
    </div>
  </main>
</div>

<script>
  const API = 'http://localhost:3000/api';

  let currentEndpoint = 'ciudadanos';

  const CONFIG = {
    ciudadanos: {
      label: 'Ciudadanos',
      btnLabel: 'Consultar ciudadanos en la DB',
      cols: [
        { key: 'id_ciudadano',      label: 'ID' },
        { key: 'nombre_completo',   label: 'Nombre' },
        { key: 'ci',                label: 'CI' },
        { key: 'credencial_civica', label: 'Credencial' },
        { key: 'fecha_nacimiento',  label: 'Nacimiento', fmt: fmtDate },
        { key: 'tiene_credencial',  label: 'Habilitado',  fmt: fmtBool },
      ]
    },
    elecciones: {
      label: 'Elecciones y participación',
      btnLabel: 'Consultar elecciones en la DB',
      cols: [
        { key: 'eleccion',              label: 'Nombre' },
        { key: 'tipo',                  label: 'Tipo' },
        { key: 'fecha',                 label: 'Fecha',           fmt: fmtDate },
        { key: 'estado',                label: 'Estado',          fmt: fmtEstado },
        { key: 'total_participaciones', label: 'Participaciones', fmt: fmtNum },
      ]
    },
    'votos-partido': {
      label: 'Votos por partido',
      btnLabel: 'Consultar votos por partido en la DB',
      cols: [
        { key: 'partido',     label: 'Partido' },
        { key: 'eleccion',    label: 'Elección' },
        { key: 'total_votos', label: 'Votos válidos', fmt: fmtNum },
      ]
    },
    mesas: {
      label: 'Mesas y circuitos',
      btnLabel: 'Consultar mesas y circuitos en la DB',
      cols: [
        { key: 'id_mesa',         label: 'Mesa' },
        { key: 'eleccion',        label: 'Elección' },
        { key: 'numero_circuito', label: 'Circuito' },
        { key: 'barrio_zona',     label: 'Zona' },
        { key: 'establecimiento', label: 'Establecimiento' },
        { key: 'votos_emitidos',  label: 'Votos',     fmt: fmtNum },
        { key: 'accesible',       label: 'Accesible', fmt: fmtBool },
        { key: 'estado',          label: 'Estado',    fmt: fmtEstado },
      ]
    },
    candidatos: {
      label: 'Candidatos y listas',
      btnLabel: 'Consultar candidatos y listas en la DB',
      cols: [
        { key: 'candidato',       label: 'Candidato' },
        { key: 'partido',         label: 'Partido' },
        { key: 'numero_lista',    label: 'Lista' },
        { key: 'orden_aparicion', label: 'Orden' },
        { key: 'eleccion',        label: 'Elección' },
      ]
    },
  };

  function fmtDate(v) {
    if (!v) return '—';
    return new Date(v).toLocaleDateString('es-UY', { day:'2-digit', month:'2-digit', year:'numeric' });
  }
  function fmtBool(v) {
    return v
      ? '<span class="pill pill-green">Sí</span>'
      : '<span class="pill pill-red">No</span>';
  }
  function fmtEstado(v) {
    const map = { 'Finalizada':'pill-gray','Cerrada':'pill-gray','Activa':'pill-green','Abierta':'pill-green','Pendiente':'pill-warn' };
    return `<span class="pill ${map[v]||'pill-gray'}">${v}</span>`;
  }
  function fmtNum(v) {
    return `<span class="num">${v}</span>`;
  }

  function selectSection(endpoint, btn) {
    currentEndpoint = endpoint;
    const cfg = CONFIG[endpoint];


    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');


    document.getElementById('section-title').textContent = cfg.label;
    document.getElementById('btn-label').textContent = cfg.btnLabel;
    document.getElementById('btn-query').disabled = false;


    document.getElementById('row-count').style.display = 'none';
    document.getElementById('output').innerHTML = `
      <div class="placeholder">
        <div class="ph-icon">🗃️</div>
        <p>Presioná el botón para ejecutar la consulta<br>y ver los datos de <strong>${cfg.label}</strong>.</p>
        <span>Los datos se cargan desde MySQL en el contenedor Docker.</span>
      </div>`;
  }

  async function executeQuery() {
    const endpoint = currentEndpoint;
    const cfg = CONFIG[endpoint];
    const btn = document.getElementById('btn-query');
    const badge = document.getElementById('row-count');

    btn.disabled = true;
    badge.style.display = 'none';
    document.getElementById('output').innerHTML = `
      <div class="loading"><div class="spinner"></div> Ejecutando consulta…</div>`;

    try {
      const res = await fetch(`${API}/${endpoint}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      badge.textContent = `${data.length} registros`;
      badge.style.display = 'inline-block';

      if (!data.length) {
        document.getElementById('output').innerHTML =
          `<div class="empty">Sin datos disponibles</div>`;
      } else {
        const heads = cfg.cols.map(c => `<th>${c.label}</th>`).join('');
        const rows = data.map(row => {
          const cells = cfg.cols.map(c => {
            const val = row[c.key];
            return `<td>${c.fmt ? c.fmt(val) : (val ?? '—')}</td>`;
          }).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        document.getElementById('output').innerHTML =
          `<div class="table-wrap"><table>
            <thead><tr>${heads}</tr></thead>
            <tbody>${rows}</tbody>
          </table></div>`;
      }

      document.getElementById('db-status').textContent = '● Conectado';
      document.getElementById('db-status').style.color = '#2ea84f';
    } catch (err) {
      document.getElementById('output').innerHTML =
        `<div class="empty">⚠️ Error al conectar con la API<br><small style="color:var(--muted)">${err.message}</small></div>`;
      document.getElementById('db-status').textContent = '● Sin conexión';
      document.getElementById('db-status').style.color = '#f85149';
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
